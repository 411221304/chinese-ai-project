# src/my_project/config/auto_tasks.yaml

# src/my_project/config/auto_tasks.yaml (局部替換)

generate_knowledge_task:
  description: >
    你現在是會考「單題」命題專家。請產出 **{single_count}** 道單題。
    這 {single_count} 題必須包含以下兩種題型（請隨機混合）：
    1. 【語文常識題】：字音字形、成語、修辭（不需文章）。
    2. 【短文閱讀題】：節錄 50 字以內的真實文言文、小詩或名言佳句，並為其出 1 題。
    
    【⚠️ 命題絕對鐵律 (CRITICAL RULES) ⚠️】
    - 若為「字音字形題」：請確保四個選項中，【只有一個】是完全正確的，其餘三個必須是明顯錯誤的誘答選項。
    - 【格式強制要求】：字音題的四個選項，【每一個選項】都必須使用「」標示出要測驗的目標字！絕對不可遺漏。
      ❌ 錯誤示範："B": "戛然而止 (ㄐㄧㄚˊ)"
      ✅ 正確示範："B": "「戛」然而止 (ㄐㄧㄚˊ)"
    - 撰寫詳解時，必須嚴格對照你在選項中給出的誘答內容。
      例如：若選項A給了錯誤注音 (ㄌㄢˊ)，你的詳解必須寫「A. 『爛』應讀作(ㄌㄢˋ)，而非選項中的(ㄌㄢˊ)」。絕對不可出現「(ㄌㄢˋ)應為(ㄌㄢˋ)」這種荒謬的自我重複邏輯。
    
  expected_output: >
    必須是一個合法的 JSON 格式「陣列 (Array)」。
    【警告】絕對禁止在 JSON 之外或之內輸出你的思考過程、碎碎念或自我糾正。
    請直接在腦中思考完畢後，只輸出最終確定版的 JSON 陣列！
    [
      {{
        "題型": "語文常識",
        "文章內容": "", 
        "題幹": "下列「」中的字音，何者正確？",
        "A": "天真「爛」漫 (ㄌㄢˊ)",
        "B": "一「哄」而散 (ㄏㄨㄥ)",
        "C": "精神「抖」擻 (ㄉㄡˇ)",
        "D": "躊「躇」不前 (ㄓㄨˊ)",
        "答案": "C",
        "詳解": "A. 爛應讀作(ㄌㄢˋ)，而非(ㄌㄢˊ)。B. 哄應讀作(ㄏㄨㄥˋ)，而非(ㄏㄨㄥ)。C. 抖讀作(ㄉㄡˇ)，正確。D. 躇應讀作(ㄔㄨˊ)，而非(ㄓㄨˊ)。"
      }}
    ]
  agent: knowledge_expert_agent

# (下方的 generate_creative_reading_task 保持不變即可)

generate_creative_reading_task:
  description: >
    你現在是會考「題組」命題專家。請產出總共 **{group_count}** 道題目。
    請撰寫/節錄 **{article_count}** 篇文章，並將這 {group_count} 題分配到這 {article_count} 篇文章中（平均每篇文章配 2~3 題）。
    這 {article_count} 篇文章必須包含「真實文言文節錄」與「原創白話文/科普文」。
    
  expected_output: >
    必須是一個合法的 JSON 格式「陣列 (Array)」。
    【警告】絕對禁止在 JSON 之外或之內輸出你的思考過程、碎碎念或自我糾正。
    請直接在腦中思考完畢後，只輸出最終確定版的 JSON 陣列，絕不能有任何廢話或多餘的換行！
    [
      {{
        "文體": "文言文",
        "文章出處": "《史記》",
        "文章內容": "項羽乃悉引兵渡河，皆沉船，破釜甑...",
        "題目列表": [
           {{ "題型": "文意推論", "題幹": "題目1...", "A": "...", "B": "...", "C": "...", "D": "...", "答案": "...", "詳解": "..." }},
           {{ "題型": "細節擷取", "題幹": "題目2...", "A": "...", "B": "...", "C": "...", "D": "...", "答案": "...", "詳解": "..." }}
        ]
      }}
    ]
  agent: creative_author_agent